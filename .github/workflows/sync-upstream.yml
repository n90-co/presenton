name: Sync Upstream Presenton

on:
  schedule:
    # Check every Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/presenton/presenton.git
          git fetch upstream main

      - name: Check for upstream changes
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          if [ "$BEHIND" -gt 0 ]; then
            echo "Upstream has $BEHIND new commits"
            LATEST_TAG=$(git describe --tags upstream/main --abbrev=0 2>/dev/null || echo "unknown")
            echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
            echo "has_updates=true" >> $GITHUB_OUTPUT
          else
            echo "Fork is up to date with upstream"
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Create sync branch
        if: steps.check.outputs.has_updates == 'true'
        run: |
          git checkout -b sync/upstream-$(date +%Y%m%d)
          git merge upstream/main --no-edit || true

      - name: Create Pull Request
        if: steps.check.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: sync/upstream-${{ github.run_id }}
          title: "Upstream sync: ${{ steps.check.outputs.behind }} new commits (tag: ${{ steps.check.outputs.latest_tag }})"
          body: |
            ## Upstream Sync

            The upstream [presenton/presenton](https://github.com/presenton/presenton) repo has **${{ steps.check.outputs.behind }}** new commits since our last sync.

            Latest upstream tag: `${{ steps.check.outputs.latest_tag }}`

            ### Review checklist
            - [ ] Check for breaking changes in `presentation-templates/` (our n90-brand templates)
            - [ ] Check for changes to `index.tsx` registration (may need to re-add our entries)
            - [ ] Check for Dockerfile changes (we use custom split Dockerfiles)
            - [ ] Check for new dependencies that affect image size
            - [ ] Test build after merge: `docker build -f Dockerfile.frontend ...`
            - [ ] Test build after merge: `docker build -f Dockerfile.api ...`

            ### What NOT to auto-merge
            - Changes to `servers/nextjs/app/presentation-templates/index.tsx` — we have custom registrations
            - Changes to `Dockerfile` — we use `Dockerfile.frontend` and `Dockerfile.api`
            - Changes to `start.js` or `nginx.conf` — we don't use these

            ---
            *Auto-generated by sync-upstream workflow*
          labels: upstream-sync
          draft: true
